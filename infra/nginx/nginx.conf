server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité (mode nginx ; en mode Render c'est helmet côté API).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.paldb.cc https://cdn.discordapp.com; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    # Décommenter derrière TLS :
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # API → conteneur NestJS
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Données statiques du jeu : immuables entre deux MAJ du jeu
    location /game-assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback SPA Angular
    location / {
        try_files $uri $uri/ /index.html;
    }
}
