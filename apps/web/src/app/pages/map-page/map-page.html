<div class="mapwrap">
  <aside class="side" [class.side-open]="sideOpen()" [class.side--searching]="search().trim() !== ''">
    <div class="side__head">
      <input
        type="search"
        id="sfind"
        placeholder="Filtrer les marqueurs…"
        [ngModel]="search()"
        (ngModelChange)="search.set($event)"
        name="sfind"
        aria-label="Filtrer les marqueurs"
      />
    </div>
    <div class="side__scroll">
      @for (g of visibleGroups(); track g.key) {
        <section class="sgroup" [class.sgroup--closed]="!isOpen(g.key)">
          <button type="button" class="sgroup__h" (click)="toggleGroup(g.key)">
            <span class="sgroup__c"></span>
            <span class="sgroup__t">{{ g.label }}</span>
            @if (g.key !== 'pals') {
              <span class="sgroup__all" (click)="toggleAll($event, g)">tout</span>
            }
          </button>
          @if (isOpen(g.key)) {
            <div class="sgroup__body">
              @for (l of g.layers; track l.key) {
                <button
                  type="button"
                  class="srow"
                  [class.srow--empty]="l.n === 0"
                  [attr.aria-pressed]="enabledSig().has(l.key)"
                  (click)="toggleLayer(l.key)"
                >
                  @if (l.icon) {
                    <img
                      class="srow__ic"
                      [class.srow__ic--pal]="l.pal"
                      [src]="l.pal ? l.icon : '/game-assets/map-icons/' + l.icon"
                      alt=""
                      loading="lazy"
                    />
                  }
                  <span class="srow__t">{{ l.label }}</span>
                  @if (l.n) {
                    <span class="srow__n">{{ l.n }}</span>
                  }
                </button>
              }
            </div>
          }
        </section>
      }
    </div>
  </aside>

  <div class="maparea">
    <div id="palhub-map"></div>
    <div class="mapui mapsel">
      @for (a of areaLabels; track a.key) {
        <button type="button" [attr.aria-pressed]="area() === a.key" (click)="setArea(a.key)">
          {{ a.label }}
        </button>
      }
    </div>
    <div class="mapui mapui--coords" aria-live="polite">{{ coords() }}</div>
    <button type="button" class="mapui sidetoggle" (click)="sideOpen.set(!sideOpen())">Filtres</button>
  </div>
</div>
